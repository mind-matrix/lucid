name: Verify

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check physical CSS (i18n gate)
        run: bun run check:physical-css

      - name: Build packages
        run: bun run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      - name: Accessibility + visual regression
        # `updateSnapshots: "missing"` in playwright.config.ts lets baselines
        # self-bootstrap the first time a test runs in a new OS/browser combo
        # (e.g. chromium-linux on GH runners). Existing baselines are compared
        # strictly.
        run: bunx playwright test

      - name: Commit generated Linux baselines
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/components/src/**/__snapshots__/*-chromium-linux.png || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(visual): bootstrap Linux baselines [skip ci]"
            git push
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
