name: Deploy web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        # `bun run build` runs verify → test:a11y, which drives Playwright.
        # Deploys must fail if any test fails, so we install the browser here.
        run: bunx playwright install --with-deps chromium

      - name: Detect base path
        id: base
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          echo "path=/${repo}/" >> "$GITHUB_OUTPUT"

      - name: Build (verify → packages → web)
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
